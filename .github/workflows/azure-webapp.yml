name: Build and deploy ResonanceAI to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ext-sjana-vibrac
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile Python modules
        run: python -m compileall backend main.py

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          rsync -av --exclude '__pycache__' --exclude '*.pyc' backend/ deploy/backend/
          cp main.py startup.sh deploy/
          cp backend/requirements.txt deploy/requirements.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resonanceai-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resonanceai-app
          path: deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
