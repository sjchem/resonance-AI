# Build and deploy the lightweight FastAPI POC as a small Azure Web App
# container. This avoids Azure/Oryx server-side Python builds and keeps the
# previous heavy FEM/CadQuery Dockerfile available for later CAD-export work.

name: Build and deploy web container to Azure Web App - ext-sjana-vibrac

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ext-sjana-vibrac
  REGISTRY: ghcr.io
  IMAGE_NAME: sjchem/resonance-ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push lightweight web image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker build \
            -f Dockerfile.web \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CC196E0321B54F62AF65E48C2162A4D3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C3AEEDEFDE8248D8A87FEF8424F795F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6069D6E7CB5442DC8480B436192F7C55 }}

      - name: Point Azure Web App at lightweight image
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          RG=$(az webapp list --query "[?name=='${APP}'].resourceGroup | [0]" -o tsv)
          if [ -z "${RG}" ]; then
            echo "Could not find Web App '${APP}' in this subscription." >&2
            exit 1
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          az webapp config set \
            --name "${APP}" \
            --resource-group "${RG}" \
            --linux-fx-version "DOCKER|${IMAGE}" \
            --always-on true
          az webapp config appsettings set \
            --name "${APP}" \
            --resource-group "${RG}" \
            --settings \
              WEBSITES_PORT=8000 \
              PORT=8000 \
              WEBSITES_CONTAINER_START_TIME_LIMIT=1800 \
              GUNICORN_TIMEOUT=600
          az webapp restart --name "${APP}" --resource-group "${RG}"
