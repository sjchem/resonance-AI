# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - ext-sjana-vibrac

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend
        run: |
          source antenv/bin/activate
          python -m compileall backend main.py

      - name: Prepare lightweight deployment package
        run: |
          mkdir -p deploy
          rsync -av --exclude '__pycache__' --exclude '*.pyc' backend/ deploy/backend/
          cp main.py startup.sh deploy/
          cp backend/requirements.txt deploy/requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CC196E0321B54F62AF65E48C2162A4D3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C3AEEDEFDE8248D8A87FEF8424F795F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6069D6E7CB5442DC8480B436192F7C55 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'ext-sjana-vibrac'
          slot-name: 'Production'
          package: .
          
