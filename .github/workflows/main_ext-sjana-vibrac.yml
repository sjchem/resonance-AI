# Build a FEM-capable Docker image and deploy it to the Azure Web App.
#
# The container bundles the CalculiX 'ccx' solver + CadQuery/gmsh/PyVista so the
# /run-fem von Mises contour endpoint works in production. The image is pushed to
# GitHub Container Registry (GHCR) and the Web App is pointed at it.

name: Build and deploy container to Azure Web App - ext-sjana-vibrac

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ext-sjana-vibrac

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner}/resonance-ai" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write   # required for OIDC login to Azure
      contents: read
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CC196E0321B54F62AF65E48C2162A4D3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C3AEEDEFDE8248D8A87FEF8424F795F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6069D6E7CB5442DC8480B436192F7C55 }}

      - name: Point the Web App at the new container image
        shell: bash
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}:${{ github.sha }}
        run: |
          set -euo pipefail
          APP="${{ env.AZURE_WEBAPP_NAME }}"

          # Discover the resource group for this Web App in the current subscription.
          RG=$(az webapp list --query "[?name=='${APP}'].resourceGroup | [0]" -o tsv)
          if [ -z "${RG}" ]; then
            echo "Could not find Web App '${APP}' in this subscription." >&2
            exit 1
          fi
          echo "Deploying ${IMAGE} to ${APP} (resource group ${RG})"

          # Settings the FEM container needs: listen port, generous startup +
          # request timeouts (image pull + first solve can be slow).
          az webapp config appsettings set --name "${APP}" --resource-group "${RG}" --settings \
            WEBSITES_PORT=8000 \
            GUNICORN_TIMEOUT=600 \
            WEBSITES_CONTAINER_START_TIME_LIMIT=1800 \
            PYVISTA_OFF_SCREEN=true

          # Point the app at the public GHCR image (anonymous pull -> no stored
          # credentials to expire). Clear any previously stored registry creds.
          az webapp config container set --name "${APP}" --resource-group "${RG}" \
            --docker-custom-image-name "${IMAGE}" \
            --docker-registry-server-url "https://ghcr.io"

          az webapp config appsettings delete --name "${APP}" --resource-group "${RG}" \
            --setting-names DOCKER_REGISTRY_SERVER_USERNAME DOCKER_REGISTRY_SERVER_PASSWORD 2>/dev/null || true

          az webapp restart --name "${APP}" --resource-group "${RG}"
