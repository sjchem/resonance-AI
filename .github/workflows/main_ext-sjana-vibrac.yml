# Deploy the lightweight FastAPI POC to Azure App Service.
#
# The production POC only needs the backend parser, chat UI, upload helpers, and
# browser-side CAD preview. Heavy FEM/CadQuery dependencies are intentionally
# left out of this deployment so the Web App starts quickly and reliably.

name: Build and deploy Python app to Azure Web App - ext-sjana-vibrac

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ext-sjana-vibrac
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend
        run: |
          source antenv/bin/activate
          python -m compileall backend main.py

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          rsync -a --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            backend/ deploy/backend/
          cp main.py startup.sh deploy/
          cp backend/requirements.txt deploy/requirements.txt
          python -m pip install \
            --disable-pip-version-check \
            --target deploy/.python_packages/lib/site-packages \
            -r backend/requirements.txt
          cat > deploy/.deployment <<'EOF'
          [config]
          SCM_DO_BUILD_DURING_DEPLOYMENT=false
          ENABLE_ORYX_BUILD=false
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CC196E0321B54F62AF65E48C2162A4D3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C3AEEDEFDE8248D8A87FEF8424F795F1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6069D6E7CB5442DC8480B436192F7C55 }}

      - name: Configure Web App for Python startup
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          RG=$(az webapp list --query "[?name=='${APP}'].resourceGroup | [0]" -o tsv)
          if [ -z "${RG}" ]; then
            echo "Could not find Web App '${APP}' in this subscription." >&2
            exit 1
          fi

          # Switch back from custom-container mode to the built-in Python stack.
          # This also makes the Startup Command visible again in App Service.
          az webapp config container delete --name "${APP}" --resource-group "${RG}" || true
          az webapp config set --name "${APP}" --resource-group "${RG}" \
            --linux-fx-version "PYTHON|${{ env.PYTHON_VERSION }}" \
            --startup-file "bash startup.sh" \
            --always-on true
          az webapp config appsettings set --name "${APP}" --resource-group "${RG}" --settings \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            ENABLE_ORYX_BUILD=false \
            WEBSITE_STACK=python \
            WEBSITE_RUN_FROM_PACKAGE=0 \
            SCM_SCRIPT_GENERATOR_ARGS="--platform python --platform-version ${{ env.PYTHON_VERSION }}" \
            PORT=8000 \
            GUNICORN_TIMEOUT=600

      - name: Deploy prepared package through Kudu file API
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          RG=$(az webapp list --query "[?name=='${APP}'].resourceGroup | [0]" -o tsv)
          if [ -z "${RG}" ]; then
            echo "Could not find Web App '${APP}' in this subscription." >&2
            exit 1
          fi

          zip -qr app.zip .
          SCM_URI=$(az webapp deployment list-publishing-credentials \
            --resource-group "${RG}" \
            --name "${APP}" \
            --query scmUri \
            -o tsv)
          SCM_HOST="${SCM_URI#https://}"
          SCM_HOST="${SCM_HOST#*@}"
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://management.core.windows.net/ \
            --query accessToken \
            -o tsv)
          curl --fail --silent --show-error \
            -X PUT \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data-binary @app.zip \
            "https://${SCM_HOST%/}/api/zip/site/wwwroot/"
          az webapp restart --name "${APP}" --resource-group "${RG}"
